name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=$(grep -oP '(?<=<Version>)[^<]+' SugarFreeHealthyDiet/SugarFreeHealthyDiet.csproj)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yaml run --rm sugar-free-healthy-diet

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            johnwatson484/sugar-free-healthy-diet:latest
            johnwatson484/sugar-free-healthy-diet:${{ env.VERSION }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ env.VERSION }} || gh release create ${{ env.VERSION }} --title ${{ env.VERSION }} --generate-notes

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
